<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Bot Constructor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0A0A0A;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <!-- Кнопка "Назад" -->
    <a href="/admin" class="fixed top-6 left-6 z-50 flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200" style="background: #111111; color: #A1A1AA; border: 1px solid #27272A;" onmouseover="this.style.background='#1A1A1A'" onmouseout="this.style.background='#111111'">
        ← Вернуться
    </a>

    <div class="rounded-xl shadow-2xl p-8 w-full max-w-md" style="background: #111111; border: 1px solid #27272A;">
        <div class="text-center mb-8">
            <div class="text-5xl mb-4">🤖</div>
            <h1 class="text-2xl font-bold mb-1" style="color: #FFFFFF;">Bot Constructor</h1>
            <p style="color: #71717A;">Панель администратора</p>
        </div>

        {% if error %}
        <div class="px-4 py-3 rounded-lg mb-6 text-sm" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #FCA5A5;">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/admin/login" class="space-y-6">
            <input type="hidden" name="next" value="{{ request.query_params.get('next', '/admin') }}">

            <div>
                <label for="username" class="block text-sm font-medium mb-2" style="color: #A1A1AA;">
                    Логин
                </label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    autofocus
                    class="w-full px-4 py-3 rounded-lg outline-none transition-all duration-200"
                    style="background: #1A1A1A; border: 1px solid #27272A; color: #FFFFFF;"
                    placeholder="Введите логин"
                    onfocus="this.style.borderColor='#3B82F6'"
                    onblur="this.style.borderColor='#27272A'"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-2" style="color: #A1A1AA;">
                    Пароль
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full px-4 py-3 rounded-lg outline-none transition-all duration-200"
                    style="background: #1A1A1A; border: 1px solid #27272A; color: #FFFFFF;"
                    placeholder="Введите пароль"
                    onfocus="this.style.borderColor='#3B82F6'"
                    onblur="this.style.borderColor='#27272A'"
                >
            </div>

            <button
                type="submit"
                class="w-full py-3 rounded-lg font-medium transition-all duration-200"
                style="background: #3B82F6; color: #FFFFFF;"
                onmouseover="this.style.background='#2563EB'"
                onmouseout="this.style.background='#3B82F6'"
            >
                Войти
            </button>
        </form>

        <div class="mt-6 text-center text-sm" style="color: #71717A;">
            <p>Доступ только для авторизованных пользователей</p>
        </div>
    </div>
</body>
</html>
